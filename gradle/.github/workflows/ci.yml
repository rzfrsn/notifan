name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Start local infra
        run: docker compose up -d

      - name: Wait for PostgreSQL
        run: |
          for i in {1..30}; do
            docker exec notifan-postgres pg_isready -U notifan && break
            sleep 2
          done

      - name: Run tests
        run: ./gradlew test

      - name: Tear down infra
        if: always()
        run: docker compose down -v
